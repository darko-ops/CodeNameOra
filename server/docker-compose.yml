services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dromo
      POSTGRES_PASSWORD: dromo
      POSTGRES_DB: dromo
    ports:
      - "5432:5432"
    volumes:
      - dromo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dromo"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://dromo:dromo@db:5432/dromo
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dromo_pg:
